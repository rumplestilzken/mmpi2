plugins {
    id 'application'
}

group = 'com.rumplestilzken'
version = '1.0'

application {
    mainClass = "com.rumplestilzken.Main"
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.9.1')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    implementation group: 'io.qtjambi', name: 'qtjambi', version: '5.15.17'
    implementation group: 'org.json', name: 'json', version: '20231013'
    implementation group: 'com.fasterxml.jackson.core', name: 'jackson-databind', version: '2.16.0'
    implementation group: 'com.lowagie', name: 'itext', version: '4.2.2'
}

test {
    useJUnitPlatform()
}
